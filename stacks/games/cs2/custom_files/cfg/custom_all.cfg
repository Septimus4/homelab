// homelab override for kus/cs2-modded-server.
// Files under custom_files/ mirror the csgo/ tree and overwrite the mod defaults
// on every boot (install_docker.sh: cp -RT /home/custom_files/ .../game/csgo/).
// custom_all.cfg runs after the server's server.cfg for ALL game modes, so settings
// here apply globally. See https://github.com/kus/cs2-modded-server#custom-files
hostname "NAS-CS2"
